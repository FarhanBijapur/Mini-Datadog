version: 3

systemUnderTest:
  service:
    definitions:
      - definition:
          source:
            filesystem:
              directory: contracts/openapi
          specs:
            - mini-datadog.openapi.json

    runOptions:
      openapi:
        type: test
        baseUrl: "${SPECMATIC_TEST_BASE_URL:http://127.0.0.1:8000}"

    data:
      examples:
        - directories:
            - contracts/openapi/mini-datadog.openapi_examples

specmatic:
  settings:
    test:
      schemaResiliencyTests: all